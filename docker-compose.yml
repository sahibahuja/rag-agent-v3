name: rag-agent-v3

services:
  # 1. Vector Database (Knowledge Base)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_v2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always

  # 2. Stateful Memory (Conversation History)
  redis:
    image: redis/redis-stack-server:latest
    container_name: agent_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - ./redis_data:/data

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "8001:5540" # The UI will be available on port 8001
    depends_on:
      - redis       # Make sure your main redis service is named 'redis'
    restart: unless-stopped

  # --- NEW: Step 5 - Telemetry Persistence Database ---
  postgres:
    image: postgres:15-alpine
    container_name: phoenix_postgres
    environment:
      - POSTGRES_USER=phoenix_user
      - POSTGRES_PASSWORD=phoenix_password
      - POSTGRES_DB=phoenix_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: always

  # 3. Observability & Tracing (Arize Phoenix)
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix_v2
    ports:
      - "6006:6006" # Dashboard UI
      - "4319:4317" # OTLP Collector
    environment:
      # Tell Phoenix to use Postgres instead of its temporary local memory!
      - PHOENIX_SQL_DATABASE_URL=postgresql://phoenix_user:phoenix_password@postgres:5432/phoenix_db
    depends_on:
      - postgres
    restart: always

networks:
  default:
    name: rag_network_v3